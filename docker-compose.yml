version: '3.8'

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - frontend

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    container_name: auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth-service/.env
    volumes:
      - ./services/auth-service:/app
      - auth_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - auth
      - frontend
      - patient       # ← added: patient dev needs login
      - doctor        # ← added: doctor dev needs login
      - appointment   # ← added: booking flow needs login
      - payment       # ← added: payment flow needs login
      - telemedicine  # ← added: video session needs login
      - ai-symptom    # ← added: ai checker needs login

  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile.dev
    container_name: patient-service
    ports:
      - "3002:3002"
    env_file:
      - ./services/patient-service/.env
    volumes:
      - ./services/patient-service:/app
      - patient_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - patient
      - frontend
      - appointment   # ← added: patient is who books
      - payment       # ← added: patient is who pays
      - telemedicine  # ← added: patient is who consults

  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile.dev
    container_name: doctor-service
    ports:
      - "3003:3003"
    env_file:
      - ./services/doctor-service/.env
    volumes:
      - ./services/doctor-service:/app
      - doctor_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - doctor
      - frontend
      - appointment   # already existed — correct
      - telemedicine  # ← added: doctor is who consults

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile.dev
    container_name: appointment-service
    ports:
      - "3004:3004"
    env_file:
      - ./services/appointment-service/.env
    volumes:
      - ./services/appointment-service:/app
      - appointment_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - appointment
      - frontend
      - payment       # ← added: payment verifies appointment
      - telemedicine  # ← added: video session tied to appointment

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile.dev
    container_name: payment-service
    ports:
      - "3005:3005"
    env_file:
      - ./services/payment-service/.env
    volumes:
      - ./services/payment-service:/app
      - payment_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - payment
      - frontend

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile.dev
    container_name: notification-service
    ports:
      - "3006:3006"
    env_file:
      - ./services/notification-service/.env
    volumes:
      - ./services/notification-service:/app
      - notification_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - notification
      - appointment   # already existed — correct
      - payment       # ← added: payment confirmation
      - telemedicine  # ← added: session reminders
      - frontend      # ← added: frontend needs notifications

  telemedicine-service:
    build:
      context: ./services/telemedicine-service
      dockerfile: Dockerfile.dev
    container_name: telemedicine-service
    ports:
      - "3007:3007"
    env_file:
      - ./services/telemedicine-service/.env
    volumes:
      - ./services/telemedicine-service:/app
      - telemedicine_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - telemedicine
      - frontend

  ai-symptom-service:
    build:
      context: ./services/ai-symptom-service
      dockerfile: Dockerfile.dev
    container_name: ai-symptom-service
    ports:
      - "3008:3008"
    env_file:
      - ./services/ai-symptom-service/.env
    volumes:
      - ./services/ai-symptom-service:/app
      - ai_symptom_modules:/app/node_modules
    networks:
      - healthcare-net
    restart: unless-stopped
    profiles:
      - full
      - ai-symptom
      - frontend

volumes:
  auth_modules:
  patient_modules:
  doctor_modules:
  appointment_modules:
  payment_modules:
  notification_modules:
  telemedicine_modules:
  ai_symptom_modules:

networks:
  healthcare-net:
    driver: bridge
